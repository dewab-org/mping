name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: go build ./cmd/mping
      - name: Test
        run: go test ./...

  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/mping-linux-amd64 ./cmd/mping
      - name: Build linux arm64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/mping-linux-arm64 ./cmd/mping
      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o dist/mping-darwin-arm64 ./cmd/mping
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mping-binaries
          path: dist/
