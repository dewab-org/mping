name: Build and Test

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: go build ./cmd/mping
      - name: Test
        run: go test ./...

  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/mping-linux-amd64 ./cmd/mping
      - name: Build linux arm64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/mping-linux-arm64 ./cmd/mping
      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o dist/mping-darwin-arm64 ./cmd/mping
      - name: Package binaries
        run: |
          mkdir -p dist/pkg
          tar czf dist/pkg/mping-linux-amd64.tar.gz -C dist mping-linux-amd64
          tar czf dist/pkg/mping-linux-arm64.tar.gz -C dist mping-linux-arm64
          tar czf dist/pkg/mping-darwin-arm64.tar.gz -C dist mping-darwin-arm64
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mping-binaries
          path: dist/pkg/*.tar.gz
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/pkg/*.tar.gz
      - name: Nightly artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly build
          files: dist/pkg/*.tar.gz
